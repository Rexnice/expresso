<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expresso - Play Game</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    h1 { color: #333; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { background: #4CAF50; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .timer { font-size: 48px; font-weight: bold; color: #ff6b6b; margin: 20px 0; text-align: center; }
    .question-text { font-size: 20px; font-weight: bold; margin: 20px 0; text-align: center; color: #333; }
    .category { text-align: center; font-size: 14px; color: #999; margin-bottom: 10px; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    .option-btn { 
        padding: 15px; 
        font-size: 16px; 
        border: 2px solid #ddd; 
        border-radius: 8px; 
        background: white; 
        cursor: pointer; 
        text-align: left; 
        transition: all 0.3s;
        color: #000000;
        font-weight: 500;
    }
    .option-btn:hover:not(:disabled) { 
        background: #f0f0f0; 
        transform: scale(1.02);
        border-color: #4CAF50;
    }
    .option-btn:disabled { 
        opacity: 0.6; 
        cursor: not-allowed;
        background: #f5f5f5;
    }
    .feedback { margin: 20px 0; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; }
    .feedback.correct { background: #d4edda; color: #155724; }
    .feedback.wrong { background: #f8d7da; color: #721c24; }
    .score { font-size: 24px; font-weight: bold; text-align: center; margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 8px; color: #333; }
    .leaderboard { background: #fff3e0; padding: 15px; border-radius: 10px; margin-top: 20px; }
    .leaderboard h3 { margin-top: 0; color: #333; }
    .leaderboard ol { margin: 0; padding-left: 20px; }
    .leaderboard li { margin: 5px 0; color: #333; }
    .waiting-message { text-align: center; padding: 40px; font-size: 18px; color: #666; }
</style>
</head>
<body>
<div class="container">
    <h1>🎮 Expresso Quiz</h1>
    
    <div id="joinPhase">
        <div class="join-form">
            <input type="text" id="roomCodeInput" placeholder="Enter Room Code" value="{{ room_code or '' }}">
            <input type="text" id="playerNameInput" placeholder="Your Name">
            <button onclick="joinGame()">Join Game</button>
        </div>
    </div>

    <div id="gamePhase" style="display: none;">
        <div class="score">⭐ Score: <span id="score">0</span></div>
        <div id="questionArea">
            <div class="timer" id="timer">--</div>
            <div class="category" id="category"></div>
            <div class="question-text" id="questionText">Waiting for question...</div>
            <div class="options" id="options"></div>
            <div id="feedback"></div>
        </div>
        <div id="revealArea" style="display: none;">
            <div id="revealContent"></div>
        </div>
        <div class="leaderboard">
            <h3>🏆 Leaderboard</h3>
            <ol id="leaderboardList"></ol>
        </div>
    </div>

    <div id="gameOverPhase" style="display: none;">
        <h2>Game Over!</h2>
        <div id="finalLeaderboard"></div>
        <button onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
let ably, gameChannel, playerToken, playerName, roomCode, currentScore = 0;
let hasAnswered = false;
let questionActive = false;
let timerInterval;

async function joinGame() {
    roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
    playerName = document.getElementById('playerNameInput').value.trim();
    if (!roomCode || !playerName) {
        alert('Please enter room code and name');
        return;
    }

    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Joining...';

    try {
        // Join game
        const joinRes = await fetch('/api/join-game', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ room_code: roomCode, name: playerName })
        });
        if (!joinRes.ok) {
            const err = await joinRes.json();
            alert(err.error || 'Failed to join');
            btn.disabled = false;
            btn.textContent = 'Join Game';
            return;
        }
        const joinData = await joinRes.json();
        playerToken = joinData.player_token;
        console.log('Player token:', playerToken);

        // Connect to Ably
        ably = new Ably.Realtime("rFrpsA.WXKdCA:s12mIlyI4kEYaClrYVOin8H7WR-fb3-DwWDpOVk5X6c");
        gameChannel = ably.channels.get(`game:${roomCode}`);

        // Game events
        gameChannel.subscribe('game_started', () => {
            console.log('Game started!');
            document.getElementById('joinPhase').style.display = 'none';
            document.getElementById('gamePhase').style.display = 'block';
            document.getElementById('revealArea').style.display = 'none';
            document.getElementById('questionArea').style.display = 'block';
        });

        gameChannel.subscribe('new_question', (msg) => {
            console.log('New question received:', msg.data);
            const q = msg.data;
            hasAnswered = false;
            questionActive = true;

            if (timerInterval) clearInterval(timerInterval);
            startTimer(q.time_limit);

            // Display question
            document.getElementById('category').textContent = `📚 Category: ${q.category || 'General'}`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('revealArea').style.display = 'none';
            document.getElementById('questionArea').style.display = 'block';

            // Create options buttons with black text
            const optionsHtml = `
                <button class="option-btn" onclick="submitAnswer('A')">🔵 A. ${q.options.A}</button>
                <button class="option-btn" onclick="submitAnswer('B')">🔵 B. ${q.options.B}</button>
                <button class="option-btn" onclick="submitAnswer('C')">🔵 C. ${q.options.C}</button>
                <button class="option-btn" onclick="submitAnswer('D')">🔵 D. ${q.options.D}</button>
            `;
            document.getElementById('options').innerHTML = optionsHtml;

            // Make sure game phase is visible
            if (document.getElementById('joinPhase').style.display !== 'none') {
                document.getElementById('joinPhase').style.display = 'none';
                document.getElementById('gamePhase').style.display = 'block';
            }
        });

        gameChannel.subscribe('answer_received', (msg) => {
            console.log('Answer received event:', msg.data);
            const result = msg.data;
            if (result.player_token === playerToken) {
                console.log('This is my answer result:', result);
                showFeedback(result.is_correct, result.points, result.correct_answer);
                if (result.is_correct) {
                    currentScore += result.points;
                    document.getElementById('score').textContent = currentScore;
                    console.log('Score updated to:', currentScore);
                }
            }
        });

        gameChannel.subscribe('answer_reveal', (msg) => {
            const d = msg.data;
            questionActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timer').textContent = '--';

            updateLeaderboard(d.leaderboard || []);

            const dist = Object.entries(d.answer_counts || {}).map(([k,v]) => `${k}: ${v}`).join(' | ');
            document.getElementById('revealContent').innerHTML = `
                <div style="text-align: center;">
                    <h3>📊 Answers Revealed!</h3>
                    <p><strong>✅ Correct Answer:</strong> ${d.correct_answer}</p>
                    <p><strong>📈 Distribution:</strong> ${dist}</p>
                    <p>⏰ Next question in ${d.next_in} seconds...</p>
                </div>
            `;

            document.getElementById('questionArea').style.display = 'none';
            document.getElementById('revealArea').style.display = 'block';

            // Auto return to question area
            setTimeout(() => {
                if (document.getElementById('revealArea').style.display === 'block') {
                    document.getElementById('revealArea').style.display = 'none';
                    document.getElementById('questionArea').style.display = 'block';
                }
            }, d.next_in * 1000);
        });

        gameChannel.subscribe('game_over', (msg) => {
            const d = msg.data;
            document.getElementById('gamePhase').style.display = 'none';
            document.getElementById('gameOverPhase').style.display = 'block';
            const html = `
                <h3>Final Results</h3>
                <ol>
                    ${d.all_players.map((p, i) => `<li><strong>${p.name}</strong> - ${p.score} points</li>`).join('')}
                </ol>
                ${d.top3 && d.top3.length ? `
                    <h3>🏆 Top 3 🏆</h3>
                    <ol>
                        ${d.top3.map(p => `<li><strong>${p.name}</strong> - ${p.score} points</li>`).join('')}
                    </ol>` : ''}
            `;
            document.getElementById('finalLeaderboard').innerHTML = html;
        });

        ably.connection.on('connected', () => {
            console.log('✅ Player connected to Ably');
            btn.disabled = false;
            btn.textContent = 'Joined! Waiting for host...';
            document.getElementById('joinPhase').innerHTML = '<div class="waiting-message">✅ Joined! Waiting for host to start the game...</div>';
        });

        ably.connection.on('failed', (err) => {
            console.error('Ably connection failed:', err);
            alert('Connection failed. Please refresh and try again.');
            btn.disabled = false;
            btn.textContent = 'Join Game';
        });

    } catch (error) {
        console.error(error);
        alert('Failed to join game: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'Join Game';
    }
}

function startTimer(seconds) {
    if (timerInterval) clearInterval(timerInterval);
    let timeLeft = seconds;
    document.getElementById('timer').textContent = timeLeft;
    timerInterval = setInterval(() => {
        if (!questionActive) {
            clearInterval(timerInterval);
            return;
        }
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft >= 0 ? timeLeft : 0;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            questionActive = false;
        }
    }, 1000);
}

async function submitAnswer(answer) {
    console.log('submitAnswer called with:', answer);
    console.log('Current state - questionActive:', questionActive, 'hasAnswered:', hasAnswered);
    
    if (!questionActive || hasAnswered) {
        console.log('Cannot answer: active=' + questionActive + ', answered=' + hasAnswered);
        alert('You cannot answer this question now!');
        return;
    }
    
    // Disable all option buttons immediately to prevent double submission
    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
    });
    
    hasAnswered = true;
    console.log('Submitting answer:', answer, 'for room:', roomCode, 'token:', playerToken);

    try {
        const res = await fetch('/api/submit-answer', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                room_code: roomCode,
                answer: answer,
                player_token: playerToken
            })
        });

        console.log('Response status:', res.status);
        
        if (!res.ok) {
            const err = await res.json();
            console.error('Answer submission error:', err);
            alert('Error: ' + (err.error || 'Failed to submit answer'));
            hasAnswered = false; // Allow retry on error
            // Re-enable buttons on error
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = false;
            });
            return;
        }

        const data = await res.json();
        console.log('Answer response from server:', data);
        
        // Show immediate feedback
        showFeedback(data.is_correct, data.points, data.correct_answer);
        
        // Note: Score update will come from the answer_received Ably event
        // So we don't update score here to avoid double counting
        
    } catch (e) {
        console.error('Error submitting answer:', e);
        alert('Network error: ' + e.message);
        hasAnswered = false;
        // Re-enable buttons on error
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = false;
        });
    }
}

function showFeedback(isCorrect, points, correctAnswer) {
    const div = document.getElementById('feedback');
    if (isCorrect) {
        div.innerHTML = `<div class="feedback correct">✅ Correct! +${points} points</div>`;
    } else {
        div.innerHTML = `<div class="feedback wrong">❌ Wrong! The correct answer was ${correctAnswer}</div>`;
    }
}

function updateLeaderboard(players) {
    const container = document.getElementById('leaderboardList');
    if (players && players.length > 0) {
        container.innerHTML = players.map((p, i) => 
            `<li><strong>${i+1}. ${p.name}</strong> - ${p.score} points</li>`
        ).join('');
        
        // Find current player in leaderboard and update score if needed
        const currentPlayer = players.find(p => p.name === playerName);
        if (currentPlayer && currentPlayer.score !== currentScore) {
            currentScore = currentPlayer.score;
            document.getElementById('score').textContent = currentScore;
        }
    }
}
</script>
</body>
</html>
