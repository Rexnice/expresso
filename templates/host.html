<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expresso - Host Game</title>
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 10px; }
    .room-code { font-size: 48px; font-weight: bold; text-align: center; background: #f0f0f0; padding: 20px; border-radius: 10px; margin: 20px 0; letter-spacing: 5px; font-family: monospace; }
    .qr-code { text-align: center; margin: 20px 0; }
    .qr-code img { max-width: 200px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; }
    .join-url { text-align: center; word-break: break-all; background: #f8f9fa; padding: 10px; border-radius: 5px; margin: 10px 0; }
    .players-list { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 20px 0; max-height: 300px; overflow-y: auto; }
    .player-item { padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
    button { background: #4CAF50; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; }
    button:hover { background: #45a049; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { text-align: center; font-size: 18px; margin: 20px 0; padding: 15px; background: #e8f5e9; border-radius: 10px; }
    .answer-stats { background: #e3f2fd; padding: 10px; border-radius: 5px; margin: 10px 0; text-align: center; font-weight: bold; }
    .question-preview { background: #e8f5e9; padding: 15px; border-radius: 10px; margin: 15px 0; }
    .leaderboard { background: #fff3e0; padding: 15px; border-radius: 10px; margin-top: 20px; }
    .leaderboard h3 { margin-top: 0; }
    .leaderboard ol { margin: 0; padding-left: 20px; }
    .leaderboard li { margin: 5px 0; }
    .loading { text-align: center; padding: 40px; color: #666; }
</style>
</head>
<body>
<div class="container">
    <h1>🎮 Expresso Game Host</h1>
    
    <div id="setupPhase">
        <div class="loading" id="loadingMsg">Creating game...</div>
        <div id="gameInfo" style="display:none;">
            <div class="room-code" id="roomCode"></div>
            <div class="qr-code" id="qrCode"></div>
            <div class="join-url" id="joinUrl"></div>
            <div class="players-list">
                <h3>👥 Players Joined (<span id="playerCount">0</span>)</h3>
                <div id="playersList"></div>
            </div>
            <button id="startGameBtn" onclick="startGame()">🚀 Start Game</button>
        </div>
    </div>

    <div id="gamePhase" style="display: none;">
        <div class="status" id="gameStatus">🎮 Game in Progress...</div>
        <div class="answer-stats" id="answerStats">📊 Answers: 0/0</div>
        <div class="question-preview" id="currentQuestion">Waiting for questions...</div>
        <div class="leaderboard">
            <h3>🏆 Live Leaderboard</h3>
            <ol id="leaderboardList"></ol>
        </div>
    </div>
</div>

<script>
let ably, gameChannel, hostChannel, roomCode, totalPlayers = 0;

async function createGame() {
    try {
        const res = await fetch('/api/create-game', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({}) 
        });
        const data = await res.json();
        roomCode = data.room_code;

        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('gameInfo').style.display = 'block';
        document.getElementById('roomCode').textContent = roomCode;
        document.getElementById('joinUrl').textContent = data.join_url;
        document.getElementById('qrCode').innerHTML = `<img src="data:image/png;base64,${data.qr_code}" alt="QR Code">`;

        initHost(roomCode);
    } catch (e) {
        console.error(e);
        document.getElementById('loadingMsg').innerHTML = 'Failed to create game. Please refresh.';
    }
}

async function initHost(room) {
    ably = new Ably.Realtime("rFrpsA.WXKdCA:s12mIlyI4kEYaClrYVOin8H7WR-fb3-DwWDpOVk5X6c");
    gameChannel = ably.channels.get(`game:${room}`);
    hostChannel = ably.channels.get(`host:${room}`);

    gameChannel.subscribe('game_started', () => {
        document.getElementById('setupPhase').style.display = 'none';
        document.getElementById('gamePhase').style.display = 'block';
    });

    gameChannel.subscribe('new_question', (msg) => {
        const q = msg.data;
        document.getElementById('currentQuestion').innerHTML = `
            <strong>📝 Question ${q.question_number}/${q.total_questions}</strong><br>
            ${q.question}<br><br>
            <small>📚 Category: ${q.category} | ⏱️ Time: ${q.time_limit}s</small>
        `;
        document.getElementById('answerStats').innerHTML = `📊 Answers: 0/${totalPlayers || 1}`;
    });

    gameChannel.subscribe('answer_reveal', (msg) => {
        const d = msg.data;
        updateLeaderboard(d.leaderboard || []);
        const dist = Object.entries(d.answer_counts || {}).map(([k,v]) => `${k}: ${v}`).join(' | ');
        const html = document.getElementById('currentQuestion').innerHTML;
        document.getElementById('currentQuestion').innerHTML = html + `
            <div style="margin-top:15px;padding:12px;background:#fff3e0;border-radius:8px;">
                <strong>✅ Correct Answer:</strong> ${d.correct_answer}<br>
                <strong>📈 Distribution:</strong> ${dist}
            </div>
        `;
    });

    gameChannel.subscribe('game_over', (msg) => {
        document.getElementById('gameStatus').innerHTML = '🎉 Game Over! 🎉';
        updateLeaderboard(msg.data.all_players || []);
    });

    hostChannel.subscribe('player_list_update', (msg) => updatePlayersList(msg.data.players || []));
    hostChannel.subscribe('answer_count', (msg) => {
        document.getElementById('answerStats').innerHTML = `📊 Answers: ${msg.data.answered}/${msg.data.total}`;
    });

    // Refresh players periodically
    setInterval(() => {
        fetch(`/api/game/${room}/players`)
            .then(r => r.json())
            .then(d => updatePlayersList(d.players || []))
            .catch(() => {});
    }, 3000);
}

function updatePlayersList(players) {
    totalPlayers = players.length;
    document.getElementById('playerCount').textContent = totalPlayers;
    const container = document.getElementById('playersList');
    container.innerHTML = players.length ? 
        players.map(p => `<div class="player-item"><span>👤 ${p.name}</span><span>⭐ ${p.score}</span></div>`).join('') :
        '<p>No players yet. Share the QR code!</p>';
}

function updateLeaderboard(players) {
    const container = document.getElementById('leaderboardList');
    container.innerHTML = players.map((p,i) => 
        `<li><strong>${i+1}. ${p.name}</strong> — ${p.score} pts</li>`).join('');
}

async function startGame() {
    const btn = document.getElementById('startGameBtn');
    btn.disabled = true;
    btn.textContent = "Starting...";
    try {
        const response = await fetch('/api/start-game', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({room_code: roomCode})
        });
        
        if (response.ok) {
            btn.textContent = "Game Started!";
        } else {
            const error = await response.json();
            alert(error.error || "Failed to start game");
            btn.disabled = false;
            btn.textContent = "🚀 Start Game";
        }
    } catch (e) {
        console.error(e);
        alert("Failed to start game");
        btn.disabled = false;
        btn.textContent = "🚀 Start Game";
    }
}

createGame();
</script>
</body>
</html>
